<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>

<body>
    <h1>AUTENTICACION</h1>
    <form id="formLogin" method="post" action="/autenticar">

        <div>
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="miusuario" required>
        </div>

        <div>
            <label for="clave">Contraseña</label>
            <input type="clave" id="clave" name="clave" placeholder="Tu contraseña" required>
        </div>

        <div class="btn-row">
            <button type="submit" class="btn-primary" id="btnLogin">Ingresar</button>
        </div>

    </form>
</body>

</html>
